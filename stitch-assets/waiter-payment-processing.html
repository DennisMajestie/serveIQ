<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet"/>
<title>ServeIQ | Payment Recording</title>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-secondary-fixed": "#141b2b",
                        "on-surface": "#ffffff",
                        "tertiary-container": "#00a2f4",
                        "error-container": "#ffdad6",
                        "surface": "#1A1A1A",
                        "on-primary-fixed-variant": "#783200",
                        "inverse-on-surface": "#ebf1ff",
                        "tertiary-fixed": "#cde5ff",
                        "background": "#0F0F0F",
                        "surface-container-highest": "#dce2f3",
                        "primary-fixed-dim": "#ffb690",
                        "on-background": "#ffffff",
                        "surface-container-low": "#f0f3ff",
                        "on-tertiary-fixed-variant": "#004b74",
                        "primary-container": "#f97316",
                        "surface-container": "#e7eefe",
                        "on-error-container": "#93000a",
                        "on-primary-fixed": "#341100",
                        "on-tertiary-container": "#003554",
                        "on-error": "#ffffff",
                        "on-tertiary-fixed": "#001d32",
                        "on-primary": "#ffffff",
                        "surface-container-high": "#e2e8f8",
                        "on-secondary": "#ffffff",
                        "surface-container-lowest": "#ffffff",
                        "on-secondary-container": "#5c6274",
                        "surface-tint": "#9d4300",
                        "secondary": "#575e70",
                        "tertiary-fixed-dim": "#93ccff",
                        "surface-dim": "#d3daea",
                        "secondary-fixed-dim": "#c0c6db",
                        "outline": "#8c7164",
                        "inverse-surface": "#2a313d",
                        "on-tertiary": "#ffffff",
                        "on-surface-variant": "#584237",
                        "error": "#EF4444",
                        "tertiary": "#006398",
                        "outline-variant": "#e0c0b1",
                        "on-primary-container": "#582200",
                        "primary-fixed": "#ffdbca",
                        "secondary-container": "#d9dff5",
                        "primary": "#f97316",
                        "surface-variant": "#dce2f3",
                        "surface-bright": "#f9f9ff",
                        "secondary-fixed": "#dce2f7",
                        "on-secondary-fixed-variant": "#404758",
                        "inverse-primary": "#ffb690"
                    },
                    "borderRadius": {
                        "DEFAULT": "12px",
                        "lg": "12px",
                        "xl": "16px",
                        "full": "9999px"
                    },
                    "spacing": {
                        "gutter-web": "24px",
                        "tap-target-min": "48px",
                        "stack-md": "16px",
                        "margin-page": "24px",
                        "gutter-mobile": "16px",
                        "stack-sm": "8px"
                    },
                    "fontFamily": {
                        "mono-xs": ["JetBrains Mono"],
                        "label-md": ["Inter"],
                        "display-lg": ["Inter"],
                        "body-md": ["Inter"],
                        "mono-sm": ["JetBrains Mono"],
                        "headline-md": ["Inter"],
                        "body-lg": ["Inter"]
                    },
                    "fontSize": {
                        "mono-xs": ["12px", {"lineHeight": "16px", "fontWeight": "400"}],
                        "label-md": ["14px", {"lineHeight": "20px", "fontWeight": "600"}],
                        "display-lg": ["32px", {"lineHeight": "40px", "fontWeight": "700"}],
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "mono-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                        "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                        "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #0F0F0F;
            color: white;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .numpad-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }
        .tap-feedback:active {
            transform: scale(0.96);
            opacity: 0.8;
        }
        /* Mobile safe area spacing */
        .pb-safe {
            padding-bottom: env(safe-area-inset-bottom);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="flex flex-col min-h-screen">
<!-- Top Navigation Anchor (Manual Implementation per UI requirements) -->
<header class="bg-[#0F0F0F] px-gutter-mobile h-16 flex items-center justify-between sticky top-0 z-50 border-b border-on-secondary-fixed-variant/20">
<div class="flex items-center gap-4">
<button aria-label="Go back" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface transition-colors tap-feedback">
<span class="material-symbols-outlined text-on-surface">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md text-on-surface">Table 5 — Payment</h1>
</div>
<div class="w-10 h-10 bg-surface-variant rounded-full flex items-center justify-center overflow-hidden">
<span class="material-symbols-outlined text-primary">person</span>
</div>
</header>
<main class="flex-1 px-gutter-mobile py-stack-md flex flex-col gap-6">
<!-- Total Amount Display -->
<section class="bg-surface p-6 rounded-xl border border-on-secondary-fixed-variant/20 flex flex-col items-center justify-center">
<p class="font-label-md text-label-md text-secondary uppercase tracking-widest mb-1">Total Due</p>
<h2 class="font-display-lg text-[40px] font-bold text-on-surface">₦19,887.50</h2>
</section>
<!-- Payment Methods Grid -->
<section>
<p class="font-label-md text-label-md text-secondary mb-3 px-1 uppercase tracking-wider">Method</p>
<div class="grid grid-cols-2 gap-3">
<button class="method-btn h-16 flex items-center justify-center gap-3 bg-surface border-2 border-primary rounded-xl tap-feedback transition-all" id="method-cash" onclick="selectMethod('cash')">
<span class="material-symbols-outlined text-primary">payments</span>
<span class="font-label-md text-label-md">Cash</span>
</button>
<button class="method-btn h-16 flex items-center justify-center gap-3 bg-surface border border-on-secondary-fixed-variant/20 rounded-xl tap-feedback transition-all" id="method-card" onclick="selectMethod('card')">
<span class="material-symbols-outlined text-on-surface">credit_card</span>
<span class="font-label-md text-label-md">Card</span>
</button>
<button class="method-btn h-16 flex items-center justify-center gap-3 bg-surface border border-on-secondary-fixed-variant/20 rounded-xl tap-feedback transition-all" id="method-transfer" onclick="selectMethod('transfer')">
<span class="material-symbols-outlined text-on-surface">account_balance</span>
<span class="font-label-md text-label-md">Transfer</span>
</button>
<button class="method-btn h-16 flex items-center justify-center gap-3 bg-surface border border-on-secondary-fixed-variant/20 rounded-xl tap-feedback transition-all" id="method-ussd" onclick="selectMethod('ussd')">
<span class="material-symbols-outlined text-on-surface">dialpad</span>
<span class="font-label-md text-label-md">USSD</span>
</button>
</div>
</section>
<!-- Amount Entry Field -->
<section>
<p class="font-label-md text-label-md text-secondary mb-3 px-1 uppercase tracking-wider">Paying Now</p>
<div class="relative">
<div class="absolute inset-y-0 left-4 flex items-center pointer-events-none">
<span class="font-headline-md text-headline-md text-primary">₦</span>
</div>
<input class="w-full bg-[#1A1A1A] border-on-secondary-fixed-variant/20 border-2 rounded-xl h-[64px] pl-12 pr-4 text-headline-md font-bold text-on-surface focus:border-primary outline-none text-right" id="amount-input" readonly="" type="text" value="19,887.50"/>
</div>
</section>
<!-- Numeric Keypad -->
<section class="mt-auto pb-4">
<div class="numpad-grid">
<button class="h-16 bg-surface rounded-xl flex items-center justify-center text-headline-md font-bold tap-feedback border border-on-secondary-fixed-variant/10" onclick="appendNum('1')">1</button>
<button class="h-16 bg-surface rounded-xl flex items-center justify-center text-headline-md font-bold tap-feedback border border-on-secondary-fixed-variant/10" onclick="appendNum('2')">2</button>
<button class="h-16 bg-surface rounded-xl flex items-center justify-center text-headline-md font-bold tap-feedback border border-on-secondary-fixed-variant/10" onclick="appendNum('3')">3</button>
<button class="h-16 bg-surface rounded-xl flex items-center justify-center text-headline-md font-bold tap-feedback border border-on-secondary-fixed-variant/10" onclick="appendNum('4')">4</button>
<button class="h-16 bg-surface rounded-xl flex items-center justify-center text-headline-md font-bold tap-feedback border border-on-secondary-fixed-variant/10" onclick="appendNum('5')">5</button>
<button class="h-16 bg-surface rounded-xl flex items-center justify-center text-headline-md font-bold tap-feedback border border-on-secondary-fixed-variant/10" onclick="appendNum('6')">6</button>
<button class="h-16 bg-surface rounded-xl flex items-center justify-center text-headline-md font-bold tap-feedback border border-on-secondary-fixed-variant/10" onclick="appendNum('7')">7</button>
<button class="h-16 bg-surface rounded-xl flex items-center justify-center text-headline-md font-bold tap-feedback border border-on-secondary-fixed-variant/10" onclick="appendNum('8')">8</button>
<button class="h-16 bg-surface rounded-xl flex items-center justify-center text-headline-md font-bold tap-feedback border border-on-secondary-fixed-variant/10" onclick="appendNum('9')">9</button>
<button class="h-16 bg-surface rounded-xl flex items-center justify-center text-headline-md font-bold tap-feedback border border-on-secondary-fixed-variant/10" onclick="appendNum('.')">.</button>
<button class="h-16 bg-surface rounded-xl flex items-center justify-center text-headline-md font-bold tap-feedback border border-on-secondary-fixed-variant/10" onclick="appendNum('0')">0</button>
<button class="h-16 bg-surface rounded-xl flex items-center justify-center tap-feedback border border-on-secondary-fixed-variant/10" onclick="clearLast()">
<span class="material-symbols-outlined">backspace</span>
</button>
</div>
</section>
</main>
<!-- Confirmation Action -->
<footer class="p-gutter-mobile bg-[#0F0F0F] pb-safe border-t border-on-secondary-fixed-variant/10">
<button class="w-full h-[64px] bg-primary text-white rounded-xl font-headline-md flex items-center justify-center gap-3 shadow-lg shadow-primary/20 tap-feedback active:scale-[0.98] transition-transform" onclick="confirmPayment()">
<span class="material-symbols-outlined">check_circle</span>
            Confirm Payment
        </button>
</footer>
<script>
        let currentAmount = "19,887.50";
        let isEditing = false;
        const inputEl = document.getElementById('amount-input');

        function appendNum(num) {
            if (!isEditing) {
                currentAmount = "";
                isEditing = true;
            }
            
            // Clean non-digits for logic but keep decimal
            let clean = currentAmount.replace(/,/g, '');
            
            if (num === '.' && clean.includes('.')) return;
            
            clean += num;
            formatDisplay(clean);
        }

        function clearLast() {
            let clean = currentAmount.replace(/,/g, '');
            clean = clean.slice(0, -1);
            if (clean === "") {
                clean = "0";
                isEditing = false;
            }
            formatDisplay(clean);
        }

        function formatDisplay(val) {
            currentAmount = val;
            // Basic localized formatting for NGN style display
            const parts = val.split('.');
            parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ",");
            inputEl.value = parts.join('.');
        }

        function selectMethod(method) {
            const btns = document.querySelectorAll('.method-btn');
            btns.forEach(btn => {
                btn.classList.remove('border-primary', 'border-2');
                btn.classList.add('border-on-secondary-fixed-variant/20', 'border');
                btn.querySelector('.material-symbols-outlined').classList.remove('text-primary');
                btn.querySelector('.material-symbols-outlined').classList.add('text-on-surface');
            });

            const activeBtn = document.getElementById(`method-${method}`);
            activeBtn.classList.remove('border-on-secondary-fixed-variant/20', 'border');
            activeBtn.classList.add('border-primary', 'border-2');
            activeBtn.querySelector('.material-symbols-outlined').classList.remove('text-on-surface');
            activeBtn.querySelector('.material-symbols-outlined').classList.add('text-primary');
        }

        function confirmPayment() {
            // Visual feedback for confirmed action
            const btn = event.currentTarget;
            btn.innerHTML = `<span class="material-symbols-outlined animate-spin">sync</span> Processing...`;
            btn.disabled = true;
            
            setTimeout(() => {
                btn.innerHTML = `<span class="material-symbols-outlined">task_alt</span> Payment Successful`;
                btn.classList.replace('bg-primary', 'bg-green-600');
                
                setTimeout(() => {
                    alert(`Payment of ₦${inputEl.value} recorded successfully.`);
                    window.location.reload();
                }, 1000);
            }, 1500);
        }
    </script>
</body></html>
