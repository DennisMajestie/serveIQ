<script>
        let currentPin = "";
        const MAX_PIN = 6;
        const indicators = document.querySelectorAll('.pin-dot');

        function updateIndicators() {
            indicators.forEach((dot, index) => {
                if (index < currentPin.length) {
                    dot.classList.add('active');
                } else {
                    dot.classList.remove('active');
                }
            });
        }

        function handlePin(digit) {
            if (currentPin.length < MAX_PIN) {
                currentPin += digit;
                updateIndicators();
                
                // Micro-interaction: Haptic feel via scale
                const btn = event.currentTarget;
                
                if (currentPin.length === MAX_PIN) {
                    // Simulate processing
                    setTimeout(() => {
                        console.log("PIN Entered: ", currentPin);
                        // Visual feedback for "success"
                        document.querySelector('.glass-card').style.boxShadow = "0 0 50px rgba(75, 226, 119, 0.2)";
                        
                        // Transition logic would go here
                        setTimeout(() => {
                            // Reset for demo
                            currentPin = "";
                            updateIndicators();
                            document.querySelector('.glass-card').style.boxShadow = "";
                        }, 1000);
                    }, 300);
                }
            }
        }

        function clearPin() {
            currentPin = "";
            updateIndicators();
        }

        // Atmosphere: Subtle cursor glow effect
        const body = document.body;
        body.addEventListener('mousemove', e => {
            const x = e.clientX;
            const y = e.clientY;
            body.style.backgroundImage = `
                radial-gradient(circle at ${x}px ${y}px, rgba(75, 226, 119, 0.05) 0%, transparent 40%),
                radial-gradient(at 0% 0%, rgba(75, 226, 119, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(173, 198, 255, 0.15) 0px, transparent 50%),
                radial-gradient(at 50% 50%, rgba(255, 178, 183, 0.1) 0px, transparent 50%)
            `;
        });
