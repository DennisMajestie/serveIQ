<div class="inventory-container">
  <div class="page-header">
    <div class="title-group">
      <h1 class="page-title">Inventory</h1>
      <p class="page-subtitle">Manage stock levels and alerts</p>
    </div>
    <div class="header-actions">
      <label class="toggle-label">
        <input type="checkbox" [checked]="lowStockOnly()" (change)="lowStockOnly.set(($event.target as HTMLInputElement).checked)">
        Show Low Stock Only
      </label>
      <button class="btn-refresh" (click)="loadInventory()">Refresh</button>
    </div>
  </div>

  <!-- Loading -->
  <div *ngIf="isLoading()" class="loading-state">
    <div class="spinner"></div>
  </div>

  <!-- Empty -->
  <div *ngIf="!isLoading() && inventory().length === 0" class="empty-state">
    <p>No inventory items found</p>
  </div>

  <!-- Inventory List -->
  <div *ngIf="!isLoading() && inventory().length > 0" class="inventory-grid">
    <div class="inventory-card" *ngFor="let item of inventory()">
      <div class="card-header">
        <div class="item-info">
          <h3 class="item-name">{{ item.menuItemName || 'Unknown Item' }}</h3>
        </div>
        <span class="stock-status" [class]="getStockStatusClass(item.isLowStock)">
          {{ getStockStatusText(item.isLowStock) }}
        </span>
      </div>
      <div class="card-body">
        <div class="stat-row">
          <span class="stat-label">In Stock</span>
          <span class="stat-value">{{ item.quantityInStock }}</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">Reorder Level</span>
          <span class="stat-value">{{ item.reorderLevel }}</span>
        </div>
      </div>
      <div class="card-footer">
        <button class="btn-secondary" (click)="viewMovements(item)">
          View History
        </button>
        <button class="btn-primary" (click)="openStockModal(item)">
          Add Stock
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Add Stock Modal -->
<div *ngIf="showAddStockModal()" class="modal-overlay" (click)="closeStockModal()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h3 class="modal-title">Add Stock</h3>
      <button class="modal-close" (click)="closeStockModal()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Item</label>
        <p class="form-value">{{ selectedInventory()?.menuItemName }}</p>
      </div>
      <div class="form-group">
        <label class="form-label" for="quantity">Quantity to Add</label>
        <input type="number" id="quantity" class="form-input" [value]="stockQuantity()" (change)="stockQuantity.set(($event.target as HTMLInputElement).valueAsNumber)" min="1">
      </div>
      <div class="form-group">
        <label class="form-label" for="notes">Notes (Optional)</label>
        <textarea id="notes" class="form-textarea" [value]="stockNotes()" (change)="stockNotes.set(($event.target as HTMLTextAreaElement).value)"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" (click)="closeStockModal()">Cancel</button>
      <button class="btn-primary" (click)="addStock()">Add Stock</button>
    </div>
  </div>
</div>
