<div class="profile-container">
  <header class="top-nav">
    <div class="nav-left">
      <button class="back-btn" (click)="goBack()">
        <span class="material-symbols-outlined">arrow_back</span>
      </button>
      <h1 class="nav-title">Profile</h1>
    </div>
  </header>

  <main class="profile-main">
    @if (isLoading()) {
      <div class="loading-state">Loading...</div>
    } @else {
      <div class="avatar-section">
        <div class="avatar-circle">{{ getInitials() }}</div>
        <h2 class="user-name">{{ user()?.fullName || 'Waiter' }}</h2>
        <span class="user-role">{{ user()?.role || 'waiter' | titlecase }}</span>
      </div>

      <div class="info-card">
        <div class="info-row">
          <span class="info-label">Email</span>
          <span class="info-value">{{ user()?.email || '—' }}</span>
        </div>
        <div class="info-divider"></div>
        <div class="info-row">
          <span class="info-label">Role</span>
          <span class="info-value role-badge">{{ user()?.role || 'waiter' | titlecase }}</span>
        </div>
      </div>

      <div class="actions-section">
        <button class="action-btn" (click)="changePin()">
          <span class="material-symbols-outlined">lock_reset</span>
          Change PIN
        </button>

        <button class="action-btn logout" (click)="logout()">
          <span class="material-symbols-outlined">logout</span>
          Logout
        </button>
      </div>
    }
  </main>
</div>
